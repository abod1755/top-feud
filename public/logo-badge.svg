<svg viewBox="0 0 260 260" xmlns="http://www.w3.org/2000/svg" font-family="'Cairo','Tajawal','Tahoma',sans-serif">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@900&amp;display=swap');</style>
    <radialGradient id="g" cx="0.5" cy="0.35" r="0.8">
      <stop offset="0" stop-color="#1A2A44"/>
      <stop offset="1" stop-color="#0A1526"/>
    </radialGradient>
  </defs>
  <!-- hard shadow -->
  <circle cx="130" cy="138" r="108" fill="#020912"/>
  <!-- sticker disc -->
  <circle cx="130" cy="130" r="108" fill="url(#g)" stroke="#FFCE1F" stroke-width="7"/>
  <circle cx="130" cy="130" r="98" fill="none" stroke="#42EFD4" stroke-width="2" opacity="0.5"/>

  <!-- confetti -->
  <circle cx="70" cy="70" r="6" fill="#F43F9D"/>
  <rect x="182" y="64" width="13" height="13" rx="3" fill="#FFCE1F" transform="rotate(20 188 70)"/>
  <circle cx="196" cy="172" r="6" fill="#42EFD4"/>
  <circle cx="66" cy="186" r="5" fill="#FFCE1F"/>

  <!-- wordmark -->
  <text x="130" y="150" text-anchor="middle" font-size="92" font-weight="900" fill="#FFFFFF">لمّة</text>
  <path d="M74 176 Q130 198 186 176" fill="none" stroke="#F43F9D" stroke-width="8" stroke-linecap="round"/>
  <text x="130" y="206" text-anchor="middle" font-size="20" font-weight="900" fill="#42EFD4" letter-spacing="1">العبوا سوا</text>
</svg>
